[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[unix_http_server]
file=/var/run/supervisor.sock

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[program:mysqld]
command=/usr/sbin/mysqld --user=mysql
autostart=true
autorestart=true
priority=10
stdout_logfile=/var/log/supervisor/mysqld.log
stderr_logfile=/var/log/supervisor/mysqld.err

[program:apache2]
command=/bin/bash -c "source /etc/apache2/envvars && exec /usr/sbin/apache2 -DFOREGROUND"
autostart=true
autorestart=true
priority=20
stdout_logfile=/var/log/supervisor/apache2.log
stderr_logfile=/var/log/supervisor/apache2.err

[program:icinga2]
command=/usr/sbin/icinga2 daemon
autostart=true
autorestart=true
priority=30
user=nagios
stdout_logfile=/var/log/supervisor/icinga2.log
stderr_logfile=/var/log/supervisor/icinga2.err

[program:icinga-director]
command=/usr/sbin/icinga-director-daemon
autostart=true
autorestart=true
priority=40
user=www-data
stdout_logfile=/var/log/supervisor/director.log
stderr_logfile=/var/log/supervisor/director.err
