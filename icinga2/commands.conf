/**
 * Commands (migrated from Nagios)
 *
 * NRPE cert paths: adjust NrpeCertDir in constants.conf to where
 * the Nagios TLS certs are mounted inside the Icinga2 container.
 * Default assumes the same path as the original Nagios server:
 *   const NrpeCertDir = "/opt/nagios/etc/cert"
 */

/* -----------------------------------------------------------------------
 * NRPE with mutual TLS (mirrors Nagios check_nrpe command)
 * ----------------------------------------------------------------------- */
object CheckCommand "nrpe_tls" {
  import "plugin-check-command"

  command = [ PluginDir + "/check_nrpe" ]

  arguments = {
    "-H" = "$address$"
    "-S" = "TLSv1.1+"
    "-C" = NrpeCertDir + "/nagios-cert.pem"
    "-K" = NrpeCertDir + "/nagios-key.pem"
    "-A" = NrpeCertDir + "/ca-cert.pem"
    "-c" = "$nrpe_command$"
  }
}

/* -----------------------------------------------------------------------
 * DNS checks
 * ----------------------------------------------------------------------- */
object CheckCommand "check_dns_timed" {
  import "plugin-check-command"
  command = [ PluginDir + "/check_dns" ]
  arguments = {
    "-H" = "$dns_lookup$"
    "-w" = "$dns_warn$"
    "-c" = "$dns_crit$"
  }
}

object CheckCommand "check_dns_own_MX" {
  import "plugin-check-command"
  // Checks that cal.heydtmann.eu resolves to the correct IP via Google DNS
  command = [
    PluginDir + "/check_dns",
    "-H", "cal.heydtmann.eu",
    "-s", "8.8.8.8",
    "-a", "87.106.179.96"
  ]
}

/* -----------------------------------------------------------------------
 * IMAP check
 * ----------------------------------------------------------------------- */
object CheckCommand "check_imap_timed" {
  import "plugin-check-command"
  command = [ PluginDir + "/check_imap" ]
  arguments = {
    "-H" = "$imap_host$"
    "-p" = "$imap_port$"
    "-w" = "$imap_warn$"
    "-c" = "$imap_crit$"
  }
}

/* -----------------------------------------------------------------------
 * ZWave custom plugin
 * ----------------------------------------------------------------------- */
object CheckCommand "check_zwave" {
  import "plugin-check-command"
  // Script must be present inside the Icinga2 container
  command = [ "/opt/Custom-Nagios-Plugins/check_zwave.sh" ]
}

/* -----------------------------------------------------------------------
 * Broker notification commands
 * Notifications are POSTed as JSON to the notif-broker at 192.168.181.99:5092
 * ----------------------------------------------------------------------- */

object NotificationCommand "notify-host-by-broker" {
  command = [ "/bin/bash", "-c", "curl -sf -X POST http://192.168.181.99:5092/ingest -H 'Content-Type: application/json' -d \"{\\\"source\\\":\\\"icinga2\\\",\\\"source_host\\\":\\\"${HOST_NAME}\\\",\\\"title\\\":\\\"Host ${HOST_STATE}: ${HOST_NAME}\\\",\\\"body\\\":\\\"${HOST_OUTPUT}  |  Address: ${HOST_ADDRESS}\\\",\\\"notificationtype\\\":\\\"${NOTIFICATION_TYPE}\\\",\\\"state\\\":\\\"${HOST_STATE}\\\",\\\"queue\\\":\\\"monitoring\\\",\\\"dedup_key\\\":\\\"icinga2:host:${HOST_NAME}:${NOTIFICATION_TYPE}\\\"}\" || logger -t icinga2-broker -p user.err \\\"notif-broker unreachable for host ${HOST_NAME}\\\"" ]
  env = {
    HOST_NAME         = "$host.name$"
    HOST_STATE        = "$host.state$"
    HOST_OUTPUT       = "$host.output$"
    HOST_ADDRESS      = "$address$"
    NOTIFICATION_TYPE = "$notification.type$"
  }
}

object NotificationCommand "notify-service-by-broker" {
  command = [ "/bin/bash", "-c", "curl -sf -X POST http://192.168.181.99:5092/ingest -H 'Content-Type: application/json' -d \"{\\\"source\\\":\\\"icinga2\\\",\\\"source_host\\\":\\\"${HOST_NAME}\\\",\\\"title\\\":\\\"${SERVICE_NAME}\\\",\\\"body\\\":\\\"${SERVICE_OUTPUT}\\\",\\\"notificationtype\\\":\\\"${NOTIFICATION_TYPE}\\\",\\\"state\\\":\\\"${SERVICE_STATE}\\\",\\\"queue\\\":\\\"monitoring\\\",\\\"dedup_key\\\":\\\"icinga2:svc:${HOST_NAME}:${SERVICE_NAME}\\\"}\" || logger -t icinga2-broker -p user.err \\\"notif-broker unreachable for ${HOST_NAME}/${SERVICE_NAME}\\\"" ]
  env = {
    HOST_NAME         = "$host.name$"
    SERVICE_NAME      = "$service.name$"
    SERVICE_OUTPUT    = "$service.output$"
    SERVICE_STATE     = "$service.state$"
    NOTIFICATION_TYPE = "$notification.type$"
  }
}

// Silent variant for ralf.s: adds priority=normal so the broker
// routes this to a low-priority channel
object NotificationCommand "notify-service-silent-by-broker" {
  command = [ "/bin/bash", "-c", "curl -sf -X POST http://192.168.181.99:5092/ingest -H 'Content-Type: application/json' -d \"{\\\"source\\\":\\\"icinga2\\\",\\\"source_host\\\":\\\"${HOST_NAME}\\\",\\\"title\\\":\\\"${SERVICE_NAME}\\\",\\\"body\\\":\\\"${SERVICE_OUTPUT}\\\",\\\"notificationtype\\\":\\\"${NOTIFICATION_TYPE}\\\",\\\"state\\\":\\\"${SERVICE_STATE}\\\",\\\"priority\\\":\\\"normal\\\",\\\"queue\\\":\\\"monitoring\\\",\\\"dedup_key\\\":\\\"icinga2:svc:${HOST_NAME}:${SERVICE_NAME}\\\"}\" || logger -t icinga2-broker -p user.err \\\"notif-broker unreachable for ${HOST_NAME}/${SERVICE_NAME}\\\"" ]
  env = {
    HOST_NAME         = "$host.name$"
    SERVICE_NAME      = "$service.name$"
    SERVICE_OUTPUT    = "$service.output$"
    SERVICE_STATE     = "$service.state$"
    NOTIFICATION_TYPE = "$notification.type$"
  }
}
