// Services executed on VPS agent (external monitoring perspective)
// This file is NOT managed by Director — it is manually placed in the Director stage
// by director-deploy.sh after every deploy.

// IMAP check from VPS → pi3 mailcow directly via WireGuard
object Service "IMAP from VPS" {
  import "generic-service"
  host_name = "pi3"
  check_command = "imap"
  command_endpoint = "vps"
  vars.imap_address = "192.168.181.89"
  vars.imap_port = 143
  vars.imap_timeout = 10
}

// DNS external check from VPS (bypasses local dnsmasq/adguard cache)
object Service "DNS ext from VPS" {
  import "generic-service"
  host_name = "vps"
  check_command = "dns"
  command_endpoint = "vps"
  vars.dns_lookup = "cal.heydtmann.eu"
  vars.dns_server = "9.9.9.9"
  vars.dns_expected_address = "87.106.179.96"
  vars.dns_warn = "0.5"
  vars.dns_crit = "2"
}
